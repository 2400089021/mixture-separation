<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Exploring Mixtures and Their Separations</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <header>
      <h1>Exploring Mixtures and Their Separations</h1>
      <nav class="tabs" aria-label="Mode">
        <button class="tab" id="exploreTab" aria-selected="true">Explore</button>
        <button class="tab" id="challengeTab" aria-selected="false">Mixture Challenge</button>
      </nav>
    </header>

    <section class="statusbar" aria-live="polite">
      <div class="feedback" id="feedback"></div>
      <div class="controls" aria-label="Simulation controls">
        <button class="iconbtn" id="playBtn" title="Play or pause" aria-label="Play or pause">
          <svg viewBox="0 0 48 48" width="25" height="25" aria-hidden="true"><path id="playIcon" d="M17 12 L36 24 L17 36 Z" fill="currentColor"></path></svg>
        </button>
        <button class="iconbtn" id="zoomBtn" title="Zoom" aria-label="Zoom">
          <svg viewBox="0 0 48 48" width="26" height="26" aria-hidden="true"><circle cx="21" cy="21" r="11" fill="none" stroke="currentColor" stroke-width="4"></circle><path d="M30 30 L40 40" stroke="currentColor" stroke-width="5" stroke-linecap="round"></path><circle cx="21" cy="21" r="2.5" fill="currentColor"></circle></svg>
        </button>
        <label class="sr-only" for="speed">Time speed</label>
        <input class="speed" id="speed" type="range" min="1" max="5" value="1" aria-label="Time speed">
      </div>
      <div class="badgebar challenge-only" id="stars" aria-label="Challenge stars"></div>
    </section>

    <main id="simulationMain">
      <aside class="side" aria-label="Mixture samples">
        <h2>Samples</h2>
        <div class="samples" id="samples"></div>
        <div class="challenge-card challenge-only">
          <button id="newChallenge">New mixture</button>
          <button id="resetChallenge">Reset</button>
        </div>
      </aside>

      <section class="workspace" aria-label="Workspace">
        <div class="stage" id="stage" tabindex="0" aria-label="Drop zone">
          <svg class="lab" id="lab" viewBox="0 0 900 560" role="img" aria-label="Particle simulation"></svg>
          <div class="drop-hint" id="dropHint" aria-hidden="true"></div>
          <div class="zoom" id="zoomLens" aria-hidden="true">
            <svg id="zoomSvg" viewBox="0 0 210 210"></svg>
          </div>
        </div>
        <div class="bench">
          <div class="separated" id="separated" aria-label="Separated materials"></div>
          <div class="meter" aria-label="Measuring cylinder">
            <div class="meter-fill" id="meterFill"></div>
          </div>
        </div>
      </section>

      <aside class="tools" aria-label="Separation tools">
        <h2>Tools</h2>
        <div class="toolgrid" id="tools"></div>
      </aside>
    </main>

  </div>

  <script src="simulation.js"></script>
</body>
</html>
